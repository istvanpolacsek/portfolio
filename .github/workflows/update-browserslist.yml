name: Update Browserslist Database

on:
  schedule:
    - cron: '0 2 1 * *' # 02:00 UTC on the 1st day of every month
  workflow_dispatch: # Allow manual triggering

jobs:
  update-browserslist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable --network-timeout 100000

      - name: Update browserslist database
        run: yarn dlx update-browserslist-db@latest

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update browserslist database'
          title: 'chore: update browserslist database'
          body: |
            Automated monthly update of the browserslist database.

            This updates browser usage statistics and support data.
          branch: update-browserslist-db
          delete-branch: true
